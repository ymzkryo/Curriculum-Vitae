name: build pdf

on:
  push:
    tags:
    - 'v*'
  # タグを打たないと一度も実行できない状態だと、ビルド環境の破壊に気づけないため
  # 手動実行できるようにする。タグ以外で実行した場合は Release を作らず成果物のみ残す
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build pdf and upload release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
      # Ubuntu 24.04 は AppArmor で非特権ユーザー名前空間を制限しており、
      # md-to-pdf が使う Chromium のサンドボックスが起動できず PDF 生成に失敗する。
      # --no-sandbox で回避せず、制限を外してサンドボックスを有効なまま動かす
      - name: Allow unprivileged user namespaces for Chromium sandbox
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - run: pnpm install --frozen-lockfile
      - name: build pdf
        run: pnpm run build:pdf
      - name: rename asset
        id: asset
        # action-gh-release はファイル名がそのままアセット名になるため、
        # タグ名を含むファイル名にコピーしてから添付する。
        # ドットは紛らわしいのでハイフンに置換する (v26.7.0 -> v26-7-0)。
        # タグ名は式に直接埋め込まず env 経由で渡す（コマンドインジェクション対策）
        env:
          TAG: ${{ github.ref_name }}
        run: |
          NAME="resume_${TAG//./-}.pdf"
          cp docs/README.pdf "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      - name: upload artifact
        # 手動実行時の確認用。タグ実行時も Release とは別に残しておく
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset.outputs.name }}
          path: ${{ steps.asset.outputs.name }}
          if-no-files-found: error
      - name: create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.asset.outputs.name }}
