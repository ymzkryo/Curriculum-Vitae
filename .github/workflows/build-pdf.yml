name: build pdf

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build pdf and upload release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
      - run: pnpm install --frozen-lockfile
      - name: build pdf
        run: pnpm run build:pdf
      - name: rename asset
        id: asset
        # action-gh-release はファイル名がそのままアセット名になるため、
        # タグ名を含むファイル名にコピーしてから添付する。
        # ドットは紛らわしいのでハイフンに置換する (v26.7.0 -> v26-7-0)。
        # タグ名は式に直接埋め込まず env 経由で渡す（コマンドインジェクション対策）
        env:
          TAG: ${{ github.ref_name }}
        run: |
          NAME="resume_${TAG//./-}.pdf"
          cp docs/README.pdf "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.asset.outputs.name }}
